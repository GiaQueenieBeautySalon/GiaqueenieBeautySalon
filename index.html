<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <!-- CRITICAL: This viewport meta tag ensures proper mobile scaling -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover, shrink-to-fit=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="theme-color" content="#0A0A0A" />
    <title>GiaQueenie | Luxury Beauty Salon</title>
    <meta name="description" content="Experience the pinnacle of luxury beauty at GiaQueenie. Premium hair care, exclusive beauty services, and curated products for the discerning clientele." />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      /* Critical CSS for instant loading */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      html, body {
        width: 100%;
        max-width: 100vw;
        overflow-x: hidden !important;
        position: relative;
        -webkit-text-size-adjust: 100%;
        -webkit-tap-highlight-color: transparent;
      }
      
      #root {
        min-height: 100vh;
        background: #0A0A0A;
        width: 100%;
        max-width: 100vw;
        overflow-x: hidden !important;
        display: flex;
        flex-direction: column;
      }
      
      .initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        width: 100vw;
        height: 100vh;
        background: #0A0A0A;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      
      .initial-loader::after {
        content: '';
        width: 48px;
        height: 48px;
        border: 4px solid #D4AF37;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      /* Prevent any horizontal scroll on all devices */
      .overflow-guard {
        width: 100%;
        max-width: 100vw;
        overflow-x: hidden !important;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="initial-loader"></div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
