<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>GiaQueenie | Luxury Beauty Salon</title>
    <meta name="description" content="Experience the pinnacle of luxury beauty at GiaQueenie. Premium hair care, exclusive beauty services, and curated products for the discerning clientele." />
    <meta name="theme-color" content="#0A0A0A" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      /* Loader styles */
      #root {
        min-height: 100vh;
        background: #0A0A0A;
      }
      .initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #0A0A0A;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      .initial-loader::after {
        content: '';
        width: 48px;
        height: 48px;
        border: 4px solid #D4AF37;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="initial-loader"></div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
