<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <!-- CRITICAL: Optimized viewport for Samsung and Android -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover, shrink-to-fit=no, target-densitydpi=device-dpi" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="theme-color" content="#0A0A0A" />
    <meta name="HandheldFriendly" content="true" />
    <meta name="MobileOptimized" content="width" />
    <title>GiaQueenie | Luxury Beauty Salon</title>
    <meta name="description" content="Experience the pinnacle of luxury beauty at GiaQueenie. Premium hair care, exclusive beauty services, and curated products for the discerning clientele." />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      /* Critical CSS for instant loading - Android optimized */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      html {
        width: 100%;
        height: 100%;
        overflow-x: hidden !important;
        overflow-y: auto !important;
        -webkit-overflow-scrolling: touch !important;
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }
      
      body {
        width: 100%;
        min-height: 100%;
        overflow-x: hidden !important;
        overflow-y: visible !important;
        position: relative;
        background: #0A0A0A;
        -webkit-overflow-scrolling: touch !important;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      #root {
        width: 100%;
        max-width: 100vw;
        min-height: 100vh;
        overflow-x: hidden !important;
        overflow-y: visible !important;
        position: relative;
        display: flex;
        flex-direction: column;
        -webkit-overflow-scrolling: touch !important;
      }
      
      .initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        width: 100vw;
        height: 100vh;
        background: #0A0A0A;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      
      .initial-loader::after {
        content: '';
        width: 40px;
        height: 40px;
        border: 3px solid #D4AF37;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @media (min-width: 768px) {
        .initial-loader::after {
          width: 48px;
          height: 48px;
          border-width: 4px;
        }
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      /* Prevent content cutoff */
      p, h1, h2, h3, h4, h5, h6, span, div, a, button {
        word-wrap: break-word !important;
        overflow-wrap: break-word !important;
        word-break: break-word !important;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="initial-loader"></div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
